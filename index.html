<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUID Fetch Sample</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      line-height: 1.6;
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #uuid {
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      word-break: break-all;
    }

    #status {
      color: #555;
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>
  <h1>UUID 取得デモ</h1>
  <button id="fetchButton" type="button">UUIDを取得</button>
  <div id="uuid">UUID: 未取得</div>
  <div id="status"></div>

  <script>
    const uuidElement = document.getElementById("uuid");
    const statusElement = document.getElementById("status");
    const fetchButton = document.getElementById("fetchButton");

    async function fetchUuid() {
      statusElement.textContent = "取得中...";

      try {
        const response = await fetch("https://uuid.shogo82148.com/");

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const uuid = (await response.text()).trim();
        uuidElement.textContent = `UUID: ${uuid}`;
        statusElement.textContent = "取得成功";
      } catch (error) {
        uuidElement.textContent = "UUID: 取得失敗";
        statusElement.textContent = `エラー: ${error.message}`;
      }
    }

    fetchButton.addEventListener("click", fetchUuid);

    // ページ表示時に1回だけ自動取得
    fetchUuid();
  </script>
</body>

</html>
